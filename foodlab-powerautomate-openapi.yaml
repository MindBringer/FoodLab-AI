swagger: '2.0'
info:
  title: FoodLab Internal API
  version: '1.0.0'
  description: >-
    Custom Connector definition for internal FoodLab job submission and result retrieval
    via Power Automate / Power Apps.
host: foodlab-api.internal.local:8088
basePath: /
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  ApiKeyHeader:
    type: apiKey
    in: header
    name: x-api-key
security:
  - ApiKeyHeader: []
paths:
  /api/v1/jobs/text:
    post:
      summary: Submit text analysis job
      description: Submits a FoodLab document-analysis job based on free text.
      operationId: SubmitTextJob
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/SubmitTextJobRequest'
      responses:
        '200':
          description: Job queued
          schema:
            $ref: '#/definitions/SubmitTextJobResponse'
        '400':
          description: Invalid request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/v1/jobs/{job_id}:
    get:
      summary: Get job status
      description: Returns current status for a FoodLab job.
      operationId: GetJobStatus
      parameters:
        - name: job_id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Job status
          schema:
            $ref: '#/definitions/GetJobStatusResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Job not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/v1/jobs/{job_id}/result:
    get:
      summary: Get job result
      description: Returns analysis result for a finished FoodLab job.
      operationId: GetJobResult
      parameters:
        - name: job_id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Job result
          schema:
            $ref: '#/definitions/GetJobResultResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Job not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Job not finished yet
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
definitions:
  SubmitTextJobRequest:
    type: object
    required:
      - text
      - schema_name
      - schema_version
      - rule_set
    properties:
      text:
        type: string
        example: >-
          Laboranalyse Lebensmittelprobe. Probe: Apfelsaft naturtrüb. Produkt:
          Beispiel Apfelsaft. pH-Wert: 3.4. Zucker: 8.2 g/100 ml. Blei: 0.05 mg/kg.
          Cadmium: 0.01 mg/kg. Bewertung: unauffällig.
      schema_name:
        type: string
        example: tasks/document_analysis
      schema_version:
        type: string
        example: 1.1.0
      rule_set:
        type: string
        example: document_analysis_v3
  SubmitTextJobResponse:
    type: object
    properties:
      success:
        type: boolean
        example: true
      schema_version:
        type: string
        example: 1.0.0
      job_id:
        type: string
        example: f0dc8176-a8cb-4b9c-a18c-d0962f129e7d
      status:
        type: string
        example: queued
      data:
        type: object
        properties:
          message:
            type: string
            example: job queued
      meta:
        $ref: '#/definitions/Meta'
      errors:
        type: array
        items:
          $ref: '#/definitions/ErrorItem'
  GetJobStatusResponse:
    type: object
    properties:
      success:
        type: boolean
      schema_version:
        type: string
      job_id:
        type: string
      status:
        type: string
        example: running
      data:
        type: object
        additionalProperties: true
      meta:
        $ref: '#/definitions/Meta'
      errors:
        type: array
        items:
          $ref: '#/definitions/ErrorItem'
  GetJobResultResponse:
    type: object
    properties:
      success:
        type: boolean
        example: true
      schema_version:
        type: string
        example: 1.0.0
      job_id:
        type: string
        example: f0dc8176-a8cb-4b9c-a18c-d0962f129e7d
      status:
        type: string
        example: done
      data:
        type: object
        properties:
          result:
            $ref: '#/definitions/DocumentAnalysisResult'
          validation:
            $ref: '#/definitions/ValidationResult'
          rules:
            $ref: '#/definitions/RuleEvaluation'
      meta:
        $ref: '#/definitions/Meta'
      errors:
        type: array
        items:
          $ref: '#/definitions/ErrorItem'
  DocumentAnalysisResult:
    type: object
    properties:
      matrix:
        type: string
        example: Getränk
      findings:
        type: array
        items:
          $ref: '#/definitions/Finding'
      warnings:
        type: array
        items:
          type: string
      assessment:
        type: string
        example: unauffällig
      sample_type:
        type: string
        example: Apfelsaft naturtrüb
      product_name:
        type: string
        example: Beispiel Apfelsaft
      document_type:
        type: string
        example: lab_report
  Finding:
    type: object
    properties:
      parameter:
        type: string
        example: Blei
      value:
        type: number
        format: double
        example: 0.05
      unit:
        type: string
        example: mg/kg
      status:
        type: string
        example: ok
      limit_value:
        type: number
        format: double
        example: 0.2
      limit_unit:
        type: string
        example: mg/kg
  ValidationResult:
    type: object
    properties:
      valid:
        type: boolean
        example: true
      errors:
        type: array
        items:
          type: string
      schema_name:
        type: string
        example: tasks/document_analysis
      schema_version:
        type: string
        example: 1.1.0
  RuleEvaluation:
    type: object
    properties:
      ok:
        type: boolean
        example: true
      matches:
        type: array
        items:
          $ref: '#/definitions/RuleMatch'
      rule_set:
        type: string
        example: document_analysis_v3
  RuleMatch:
    type: object
    properties:
      field:
        type: string
        example: findings[]
      value:
        type: number
        format: double
        example: 0.15
      object:
        type: object
        additionalProperties: true
      message:
        type: string
        example: Blei-Grenzwert überschritten
      rule_id:
        type: string
        example: lead_max
      severity:
        type: string
        example: warning
  Meta:
    type: object
    properties:
      provider:
        type: string
        example: foodlab-core-api
      model:
        type: string
        x-nullable: true
        example: Qwen/Qwen2.5-3B-Instruct
      processing_ms:
        type: integer
        format: int32
        example: 0
      entry_channel:
        type: string
        x-nullable: true
        example: api
  ErrorItem:
    type: object
    properties:
      code:
        type: string
      message:
        type: string
      details:
        type: object
        additionalProperties: true
  ErrorResponse:
    type: object
    properties:
      success:
        type: boolean
        example: false
      schema_version:
        type: string
      job_id:
        type: string
      status:
        type: string
        example: error
      data:
        type: object
        additionalProperties: true
      meta:
        $ref: '#/definitions/Meta'
      errors:
        type: array
        items:
          $ref: '#/definitions/ErrorItem'
