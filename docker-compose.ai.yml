services:
  llm-router:
    build:
      context: ./services/llm-router
    container_name: llm-router
    restart: unless-stopped
    environment:
      GPU_BACKEND: ${GPU_BACKEND:-nvidia}
      VLLM_URL: http://vllm:8000
      OLLAMA_URL: http://ollama:11434
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-auto}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:7b-instruct}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${LLM_ROUTER_PORT:-8091}:8091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8091/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - vllm
    networks:
      foodlab-ai:
      foodlab-svc-bridge:
        aliases:
          - llm-router

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    profiles: ["nvidia"]
    command:
      [
        "--model", "${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--gpu-memory-utilization", "${VLLM_GPU_MEMORY_UTILIZATION:-0.88}",
        "--max-model-len", "${VLLM_MAX_MODEL_LEN:-8192}"
      ]
    environment:
      HF_HOME: ${HF_HOME:-/srv/ai-gpu/cache/huggingface}
    volumes:
      - ${HF_HOME:-/srv/ai-gpu/cache/huggingface}:${HF_HOME:-/srv/ai-gpu/cache/huggingface}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - foodlab-ai

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    profiles: ["amd", "cpu"]
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
      - ${OLLAMA_MODELS_DIR:-/srv/ai-gpu/models/ollama}:/root/.ollama
    expose:
      - "11434"
    group_add:
      - video
      - render
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - foodlab-ai

  audio-api:
    build:
      context: ./services/audio-api
    container_name: audio-api
    restart: unless-stopped
    environment:
      AUDIO_MODEL: ${AUDIO_MODEL:-small}
      AUDIO_DIR: /srv/ai-gpu/audio

      # WICHTIG:
      # Qdrant liegt laut svc-Architektur auf dem Service-Node.
      # Deshalb nicht "http://qdrant:6333", sondern über Bridge-Alias.
      QDRANT_URL: ${QDRANT_URL:-http://qdrant-svc:6333}
      QDRANT_AUDIO_COLLECTION: ${QDRANT_AUDIO_COLLECTION:-audio_speakers}

      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${AUDIO_DIR_HOST:-/srv/ai-gpu/audio}:/srv/ai-gpu/audio
      - ${HF_HOME:-/srv/ai-gpu/cache/huggingface}:/root/.cache/huggingface
    expose:
      - "6080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - foodlab-ai
      - foodlab-svc-bridge

networks:
  foodlab-ai:
    name: foodlab-ai

  foodlab-svc-bridge:
    external: true
    name: foodlab-svc-bridge
